{% extends "base.html" %}

{% block content %}
<div class="container my-5">
    <h1 class="text-center mb-4">Наши клиники</h1>

    <div class="row row-cols-1 row-cols-md-2 g-4">
        {% for clinic in clinics %}
        <div class="col">
            <div class="card h-100 shadow-sm">
                <img
                    src="{{ url_for('static', path='images/clinic.jpg') }}"
                    class="card-img-top"
                    alt="Клиника {{ clinic.city }}"
                    style="object-fit: cover; height: 250px;"
                >

                <div class="card-body">
                    <h5 class="card-title">{{ clinic.city }}</h5>

                    <p class="card-text mb-2">
                        <strong>Адрес:</strong><br>
                        {{ clinic.address }}
                    </p>

                    <p class="card-text mb-2">
                        <strong>Телефон:</strong><br>
                        <a href="tel:{{ clinic.phone }}">{{ clinic.phone }}</a>
                    </p>
                </div>

            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
