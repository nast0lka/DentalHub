<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить доктора</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h3 class="card-title mb-4 text-center">
                        Добавить нового доктора
                    </h3>

                    <form action="/admin/add_doctor" method="post" enctype="multipart/form-data">

                        <div class="mb-3">
                            <label class="form-label">Имя</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Фамилия</label>
                            <input type="text" name="lastname" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Опыт (лет)</label>
                            <input type="number" name="experience" class="form-control" min="0" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Специализация (ID)</label>
                            <input type="number" name="specialization_id" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Образование</label>
                            <input type="text" name="education" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Фото</label>
                            <input type="file" name="photo" class="form-control" accept="image/*" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Клиника (ID)</label>
                            <input type="number" name="dentistry_id" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            Добавить доктора
                        </button>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
